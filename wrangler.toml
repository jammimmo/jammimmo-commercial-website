name = "jammimmo-commercial-website"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# Workers KV — used by /api/revalidate to debounce bursts of webhook calls.
# Bootstrap once: `wrangler kv:namespace create REFRESH_KV`
# then paste the returned id below.
[[kv_namespaces]]
binding = "REFRESH_KV"
id = "2edddc17ca9347a7bcb339c6bbe0597b"

# D1 intake DB — backs /api/leads and /api/views. Schema lives in
# d1/migrations/. Bootstrap once:
#   wrangler d1 create jammimmo-intake
#   # paste the returned database_id below, then:
#   wrangler d1 execute jammimmo-intake --remote --file=d1/migrations/0001_init.sql
[[d1_databases]]
binding = "INTAKE_DB"
database_name = "jammimmo-intake"
database_id = "a160c319-6236-4727-84ce-3d0d2c58c9a4"

# No [vars] block on purpose — runtime env (REVALIDATE_HMAC_SECRET,
# GH_DISPATCH_TOKEN, GH_REPO) is set via the Cloudflare Pages dashboard /
# `wrangler pages secret put` so secrets never sit in this repo.
