name: Build check

# Tier 3: push:main is handled by deploy.yml (which both checks and ships).
# This job exists for pull requests + manual smoke runs.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (smoke — admin credentials optional on fork PRs)
        env:
          ADMIN_SUPABASE_URL: ${{ secrets.ADMIN_SUPABASE_URL }}
          ADMIN_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ADMIN_SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm build
