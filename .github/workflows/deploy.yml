name: Build & deploy vitrine

# Trigger paths:
#   - push to main         : conventional CI/CD on merge
#   - workflow_dispatch    : manual rebuild from the Actions tab
#   - repository_dispatch  : webhook from admin Supabase via /api/revalidate
on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [vitrine_refresh]

# At most one deploy run at a time. New dispatches during a build cancel the
# in-flight one — the latest property state wins. Combined with the 60 s KV
# debounce in /api/revalidate, bursts of admin toggles collapse to ~1 build.
concurrency:
  group: vitrine-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Admin DB read access (service-role). Used by src/lib/supabase.build.ts
          # exclusively via process.env so Vite never bundles it.
          ADMIN_SUPABASE_URL: ${{ secrets.ADMIN_SUPABASE_URL }}
          ADMIN_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.ADMIN_SUPABASE_SERVICE_ROLE_KEY }}
          # Intake DB is Cloudflare D1, wired via wrangler.toml bindings —
          # no build-time env vars needed.
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=jammimmo-vitrine --branch=main
